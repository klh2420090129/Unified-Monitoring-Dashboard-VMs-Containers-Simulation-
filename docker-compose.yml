services:
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=unified-monitoring-secret
      - CLIENT_ORIGIN=http://localhost:5173

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
